<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Preview</title>
    <style>
        :root {
            --desktop-width: 1440px;
            --preview-scale: 1;
            color-scheme: light dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            background: #151922;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .preview-bar {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: #202633;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.86);
            font-size: 12px;
        }

        .preview-bar button {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 3px 8px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font: inherit;
        }

        .preview-bar button:hover,
        .preview-bar button:focus-visible {
            background: rgba(255, 255, 255, 0.12);
            outline: none;
        }

        .preview-shell {
            width: 100vw;
            height: calc(100vh - 36px);
            overflow: auto;
            padding: 16px;
        }

        .preview-frame-wrap {
            width: var(--desktop-width);
            height: calc((100vh - 68px) / var(--preview-scale));
            min-height: 900px;
            transform: scale(var(--preview-scale));
            transform-origin: top left;
            background: #fff;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
        }

        iframe {
            width: var(--desktop-width);
            height: 100%;
            display: block;
            border: 0;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="preview-bar">
        <span>Desktop preview: <strong id="preview-width">1440</strong>px</span>
        <button type="button" data-width="1280">1280</button>
        <button type="button" data-width="1440">1440</button>
        <button type="button" data-width="1920">1920</button>
    </div>
    <main class="preview-shell">
        <div class="preview-frame-wrap">
            <iframe src="../desktop-preview.html" title="Website desktop preview"></iframe>
        </div>
    </main>

    <script>
        const root = document.documentElement
        const widthLabel = document.getElementById('preview-width')
        let desktopWidth = 1440

        function updatePreview() {
            const availableWidth = Math.max(window.innerWidth - 32, 320)
            const scale = Math.min(1, availableWidth / desktopWidth)
            root.style.setProperty('--desktop-width', `${desktopWidth}px`)
            root.style.setProperty('--preview-scale', String(scale))
            widthLabel.textContent = String(desktopWidth)
        }

        document.querySelectorAll('[data-width]').forEach(button => {
            button.addEventListener('click', () => {
                desktopWidth = Number(button.dataset.width) || 1440
                updatePreview()
            })
        })

        window.addEventListener('resize', updatePreview)
        updatePreview()
    </script>
</body>
</html>
